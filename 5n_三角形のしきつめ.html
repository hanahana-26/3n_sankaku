<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三角形のしきつめシミュレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; touch-action: none; overflow: hidden; font-family: sans-serif; }
        canvas { background-color: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); cursor: crosshair; }
        .controls { user-select: none; }
    </style>
</head>
<body class="flex flex-col h-screen p-4 overflow-hidden">
    <!-- Header -->
    <div class="bg-white border rounded-xl p-4 mb-4 shadow-sm flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <span class="text-blue-500">▲</span> 三角形のしきつめ（手動）
            </h1>
            <div class="flex bg-slate-100 p-1 rounded-lg border">
                <button id="mode-edit-btn" class="px-4 py-1.5 rounded-md text-sm font-bold bg-white shadow-sm text-blue-600 transition-all">形をかえる</button>
                <button id="mode-tile-btn" class="px-4 py-1.5 rounded-md text-sm font-bold text-slate-500 transition-all">ならべる</button>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <label class="flex items-center gap-2 mr-4 cursor-pointer">
                <input type="checkbox" id="show-symbols-check" checked class="w-4 h-4 rounded text-blue-600">
                <span class="text-sm font-bold text-slate-700">角のしるし</span>
            </label>
            <button id="add-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-sm flex items-center gap-1">
                <span>＋</span> 三角形をふやす
            </button>
            <button id="add-flipped-btn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-700 shadow-sm flex items-center gap-1">
                <span>⇄</span> うらがえし
            </button>
            <button id="reset-btn" class="bg-slate-200 text-slate-600 px-4 py-2 rounded-lg font-bold hover:bg-slate-300 ml-2">リセット</button>
        </div>
    </div>

    <!-- Main View -->
    <div class="flex-1 relative bg-white rounded-xl shadow-inner border overflow-hidden">
        <canvas id="canvas" class="w-full h-full touch-none"></canvas>

        <!-- Legend -->
        <div id="legend" class="absolute bottom-6 right-6 bg-white/90 backdrop-blur p-3 rounded-xl border shadow-sm flex flex-col gap-2">
            <div class="flex items-center gap-2 text-xs font-bold text-slate-700">
                <div class="w-3 h-3 rounded-full border-2 border-red-500"></div> 角A (〇)
            </div>
            <div class="flex items-center gap-2 text-xs font-bold text-slate-700">
                <div class="w-3 h-3 border-2 border-green-500"></div> 角B (□)
            </div>
            <div class="flex items-center gap-2 text-xs font-bold text-slate-700">
                <div class="w-3 h-3 border-2 border-blue-500 rotate-45" style="clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></div> 角C (△)
            </div>
        </div>

        <!-- Float Menu (contextual) -->
        <div id="float-menu" class="absolute hidden bg-white border shadow-xl rounded-full p-1 flex gap-1 items-center">
            <button id="menu-flip" class="p-2 hover:bg-slate-100 rounded-full text-slate-600" title="うらがえす">⇄</button>
            <div class="w-px h-6 bg-slate-200 mx-1"></div>
            <button id="menu-del" class="p-2 hover:bg-red-50 rounded-full text-red-500" title="けす">🗑️</button>
            <button id="menu-ok" class="p-2 hover:bg-green-50 rounded-full text-green-600" title="確定">✓</button>
        </div>

        <!-- Message -->
        <div class="absolute bottom-6 left-6 max-w-sm pointer-events-none bg-white/80 p-4 rounded-2xl border shadow-sm text-sm text-slate-600" id="info-msg">
            頂点をドラッグして三角形の形を決めましょう。
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const floatMenu = document.getElementById('float-menu');
        const infoMsg = document.getElementById('info-msg');

        // State
        let mode = 'edit'; // 'edit' or 'tile'
        let showSymbols = true;
        let template = [
            { x: 0, y: -60 },
            { x: -80, y: 60 },
            { x: 80, y: 60 }
        ];
        let triangles = [
            { id: Date.now(), x: 300, y: 250, rotation: 0, isFlipped: false }
        ];
        let selectedId = triangles[0].id;
        let dragState = null;

        // Resize
        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Symbols
        function drawSymbol(x, y, angle, type) {
            if (!showSymbols) return;
            const size = 14;
            const dist = 32;
            const sx = x + Math.cos(angle) * dist;
            const sy = y + Math.sin(angle) * dist;
            ctx.save();
            ctx.translate(sx, sy);
            ctx.lineWidth = 2;
            if (type === 0) {
                ctx.strokeStyle = '#ef4444'; ctx.beginPath(); ctx.arc(0, 0, size/2, 0, Math.PI * 2); ctx.stroke();
            } else if (type === 1) {
                ctx.strokeStyle = '#22c55e'; ctx.strokeRect(-size/2, -size/2, size, size);
            } else if (type === 2) {
                ctx.strokeStyle = '#3b82f6'; ctx.beginPath(); ctx.moveTo(0, -size/2); ctx.lineTo(size/2, size/2); ctx.lineTo(-size/2, size/2); ctx.closePath(); ctx.stroke();
            }
            ctx.restore();
        }

        function getGlobalPoints(tri) {
            return template.map(p => {
                let px = p.x;
                let py = tri.isFlipped ? -p.y : p.y;
                const cos = Math.cos(tri.rotation);
                const sin = Math.sin(tri.rotation);
                return { 
                    x: (px * cos - py * sin) + tri.x, 
                    y: (px * sin + py * cos) + tri.y 
                };
            });
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = '#f8fafc'; ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            triangles.forEach(tri => {
                const pts = getGlobalPoints(tri);
                const isSelected = tri.id === selectedId;

                ctx.beginPath();
                ctx.moveTo(pts[0].x, pts[0].y);
                ctx.lineTo(pts[1].x, pts[1].y);
                ctx.lineTo(pts[2].x, pts[2].y);
                ctx.closePath();
                ctx.strokeStyle = isSelected ? '#3b82f6' : '#94a3b8';
                ctx.lineWidth = isSelected ? 3 : 1.5;
                ctx.stroke();
                ctx.fillStyle = tri.isFlipped ? '#f8fafc' : '#ffffff';
                ctx.fill();

                pts.forEach((p, i) => {
                    const next = pts[(i+1)%3];
                    const prev = pts[(i+2)%3];
                    const a1 = Math.atan2(prev.y - p.y, prev.x - p.x);
                    const a2 = Math.atan2(next.y - p.y, next.x - p.x);
                    let mid = (a1 + a2) / 2;
                    if (Math.abs(a1 - a2) > Math.PI) mid += Math.PI;
                    
                    let type = i;
                    if (tri.isFlipped) {
                        if (i === 1) type = 2; else if (i === 2) type = 1;
                    }
                    drawSymbol(p.x, p.y, mid, type);
                });

                if (isSelected && mode === 'tile') {
                    const hDist = 80;
                    const hx = tri.x + Math.cos(tri.rotation - Math.PI/2) * hDist;
                    const hy = tri.y + Math.sin(tri.rotation - Math.PI/2) * hDist;
                    ctx.beginPath(); ctx.moveTo(tri.x, tri.y); ctx.lineTo(hx, hy);
                    ctx.setLineDash([3,3]); ctx.strokeStyle = '#3b82f6'; ctx.stroke(); ctx.setLineDash([]);
                    ctx.beginPath(); ctx.arc(hx, hy, 10, 0, Math.PI*2); ctx.fillStyle = 'white'; ctx.fill(); ctx.stroke();
                }
            });

            if (mode === 'edit' && triangles.length > 0) {
                const pts = getGlobalPoints(triangles[0]);
                pts.forEach((p, i) => {
                    ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
                    ctx.fillStyle = ['#ef4444', '#22c55e', '#3b82f6'][i]; ctx.fill();
                    ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
                });
            }

            // Menu Position
            if (selectedId && mode === 'tile') {
                const tri = triangles.find(t => t.id === selectedId);
                floatMenu.style.display = 'flex';
                floatMenu.style.left = `${tri.x}px`;
                floatMenu.style.top = `${tri.y + 110}px`;
                floatMenu.style.transform = 'translateX(-50%)';
            } else {
                floatMenu.style.display = 'none';
            }
        }

        // Mouse Events
        canvas.addEventListener('mousedown', e => {
            const x = e.offsetX, y = e.offsetY;
            if (mode === 'edit') {
                const pts = getGlobalPoints(triangles[0]);
                for(let i=0; i<3; i++) {
                    if (Math.hypot(pts[i].x - x, pts[i].y - y) < 20) { dragState = { type: 'v', idx: i }; return; }
                }
            }
            if (selectedId && mode === 'tile') {
                const tri = triangles.find(t => t.id === selectedId);
                const hx = tri.x + Math.cos(tri.rotation - Math.PI/2) * 80;
                const hy = tri.y + Math.sin(tri.rotation - Math.PI/2) * 80;
                if (Math.hypot(hx-x, hy-y) < 20) { dragState = { type: 'r', id: selectedId }; return; }
            }
            for(let i=triangles.length-1; i>=0; i--) {
                const t = triangles[i];
                if (Math.hypot(t.x-x, t.y-y) < 60) {
                    selectedId = t.id; dragState = { type: 'm', id: t.id, ox: t.x-x, oy: t.y-y };
                    render(); return;
                }
            }
            selectedId = null; render();
        });

        window.addEventListener('mousemove', e => {
            if (!dragState) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;

            if (dragState.type === 'm') {
                const t = triangles.find(t => t.id === dragState.id);
                t.x = x + dragState.ox; t.y = y + dragState.oy;
            } else if (dragState.type === 'r') {
                const t = triangles.find(t => t.id === dragState.id);
                t.rotation = Math.atan2(y-t.y, x-t.x) + Math.PI/2;
            } else if (dragState.type === 'v') {
                const t = triangles[0];
                const cos = Math.cos(-t.rotation), sin = Math.sin(-t.rotation);
                const dx = x - t.x, dy = y - t.y;
                const rx = dx * cos - dy * sin;
                const ry = dx * sin + dy * cos;
                template[dragState.idx] = { x: rx, y: t.isFlipped ? -ry : ry };
            }
            render();
        });

        window.addEventListener('mouseup', () => { dragState = null; });

        // Touch support
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const mouseEvent = new MouseEvent("mousedown", {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }, {passive: false});

        // UI Buttons
        document.getElementById('mode-edit-btn').onclick = () => {
            mode = 'edit'; infoMsg.innerText = "頂点をドラッグして三角形の形を決めましょう。";
            document.getElementById('mode-edit-btn').classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            document.getElementById('mode-tile-btn').classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
            render();
        };
        document.getElementById('mode-tile-btn').onclick = () => {
            mode = 'tile'; infoMsg.innerText = "三角形をドラッグして移動、上のハンドルで回転できます。角をあわせて敷き詰めてみましょう。";
            document.getElementById('mode-tile-btn').classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            document.getElementById('mode-edit-btn').classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
            render();
        };
        document.getElementById('show-symbols-check').onchange = e => { showSymbols = e.target.checked; render(); };
        
        function add(flip) {
            const id = Date.now();
            triangles.push({ id, x: 400 + (flip?20:0), y: 300 + (flip?20:0), rotation: flip?Math.PI:0, isFlipped: flip });
            selectedId = id; 
            if(mode === 'edit') document.getElementById('mode-tile-btn').click();
            render();
        }
        document.getElementById('add-btn').onclick = () => add(false);
        document.getElementById('add-flipped-btn').onclick = () => add(true);
        document.getElementById('reset-btn').onclick = () => location.reload();

        // Float Menu Actions
        document.getElementById('menu-flip').onclick = () => {
            const t = triangles.find(t => t.id === selectedId);
            if(t) t.isFlipped = !t.isFlipped; render();
        };
        document.getElementById('menu-del').onclick = () => {
            if(triangles.length > 1) {
                triangles = triangles.filter(t => t.id !== selectedId);
                selectedId = null; render();
            }
        };
        document.getElementById('menu-ok').onclick = () => { selectedId = null; render(); };

        render();
    </script>
</body>
</html>
